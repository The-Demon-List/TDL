<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=1024" />
        <title>The Demon List</title>

        <!-- Replace your server icon by uploading an image file named "list_icon.png"-->
        <link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQLpi9cyoPCm7tR4apCM6uMovp6EDRMMQoEO-oDjXGgOg&s=10" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@500;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" type="text/css" href="/css/reset.css" />
        <link rel="stylesheet" type="text/css" href="/css/typography.css" />
        <link rel="stylesheet" type="text/css" href="/css/main.css" />
        <link rel="stylesheet" type="text/css" href="/css/pages/list.css" />
        <link
            rel="stylesheet"
            type="text/css"
            href="/css/pages/leaderboard.css"
        />
        <link rel="stylesheet" type="text/css" href="/css/pages/roulette.css" />
        <link rel="stylesheet" type="text/css" href="/css/components/nav.css" />
        <link rel="stylesheet" type="text/css" href="/css/components/btn.css" />
        <link
            rel="stylesheet"
            type="text/css"
            href="/css/components/tabs.css"
        />
        <script src="https://unpkg.com/vue@3.2.31/dist/vue.global.js"></script>
        <script src="https://unpkg.com/vue-router@4.0.14/dist/vue-router.global.prod.js"></script>
        <script type="module" src="/js/main.js"></script>
  <style>
   /* 1. Center the main page wrapper */
.page-list {
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important; /* Forces all children (header + list) to horizontal center */
    width: 100% !important;
    margin: 0 auto !important;
}

/* 2. Constrain the content so it stays centered rather than stretching to the edges */
.list-container {
    width: 90% !important;
    max-width: 800px !important; /* You can adjust this width if you want the list wider/narrower */
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
}

/* 3. Specifically center the header contents */
.page-header {
    text-align: center !important;
    width: 100% !important;
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
}

/* 4. Ensure the list items fill the container width perfectly */
.list {
    width: 100% !important;
    margin: 0 auto !important;
}

/* 4. Row Styling (Light Mode Default) */
.timemachine-layout .list tr {
    display: block !important;
    padding: 15px !important;
    margin-bottom: 10px !important;
    border-radius: 8px !important;
    background-color: #ffffff !important; /* White background */
    color: #000000 !important;            /* Black text */
    border: 1px solid #ddd !important;
}

/* 5. Dark Mode Override */
/* This specific selector ensures it only changes when the body is in dark mode */
.dark .timemachine-layout .list tr {
    background-color: #1a1a1a !important; /* Dark background */
    color: #ffffff !important;            /* White text */
    border: 1px solid #333 !important;
}
</style>     
    </head>
    <body id="app">
        <header :class="{ dark: store.dark }">
            <div class="logo">
                <h2>TDL</h2>
                <p>v2</p>
            </div>
            <nav class="nav">
                <router-link class="nav__tab" to="/">
                    <span class="type-label-lg">List</span>
                </router-link>
                <router-link class="nav__tab" to="/leaderboard">
                    <span class="type-label-lg">Leaderboard</span>
                </router-link>
                <router-link class="nav__tab" to="/roulette">
                    <span class="type-label-lg">Roulette</span>
                </router-link>
                <router-link class="nav__tab" to="/timemachine">
    <span class="type-label-lg">Time Machine</span>
</router-link>
                <div class="nav__actions">
                    <button
                        class="nav__icon"
                        @click.prevent="store.toggleDark()"
                    >
                        <img
                            :src="store.dark ? '/assets/light.svg' : '/assets/dark.svg'"
                            alt=""
                        />
                    </button>
                    <!-- Replace the '#' with your discord server's invite-->
                    <a class="nav__icon" href="https://discord.gg/XGPCpwqABt">
                        <img src="/assets/discord.svg" alt="Discord Logo" />
                    </a>
                    <!-- List record submission form, add a link to replace the '#' when putting a link to your list submission form-->
                    <a
                        class="nav__cta type-label-lg"
                        href="https://forms.gle/J9NokQHX2R6rGDgF7"
                        target="_blank"
                        >Submit Record</a
                    >
                </div>
            </nav>
        </header>
        <router-view :class="{ dark: store.dark }"></router-view>
    </body>
</html>
